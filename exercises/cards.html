<!DOCTYPE html>
<html>
<head>
<title>Card Components</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
gap:20px;
padding:40px;
}

/* card */

.card{
width:250px;
border:1px solid #ddd;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.card img{
width:100%;
}

.card:hover{
transform:scale(1.05);
}

.card-content{
padding:15px;
}

button{
background:orange;
border:none;
padding:10px;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<img src="../images/pic7.jpg" alt="Product Image">

<div class="card-content">

<h3>Product Card</h3>
<p>Example product description.</p>

<button>Buy Now</button>

</div>

</div>

</body>
</html>
