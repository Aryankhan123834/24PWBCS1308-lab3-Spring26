<!DOCTYPE html>
<html>
<head>
<title>CSS Transform Gallery</title>

<style>

body{
font-family:Arial;
display:flex;
gap:40px;
padding:50px;
}

/* box */

.box{
width:150px;
height:150px;
background:blue;
color:white;
display:flex;
align-items:center;
justify-content:center;
transition:0.5s;
}

/* rotate */

.rotate:hover{
transform:rotate(45deg);
}

/* scale */

.scale:hover{
transform:scale(1.3);
}

/* translate */

.move:hover{
transform:translateY(-50px);
}

/* combined */

.combo:hover{
transform:rotate(20deg) scale(1.2);
}

</style>

</head>

<body>

<div class="box rotate">Rotate</div>

<div class="box scale">Scale</div>

<div class="box move">Move</div>

<div class="box combo">Combo</div>

</body>
</html>
